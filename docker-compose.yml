services:
  trudesk:
    build: .
    image: ghcr.io/ernstbe/trudesk:1.2.11
    restart: always
    ports:
      - "8118:8118"
    dns:
      - "1.1.1.1"
      - "8.8.8.8"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TRUDESK_DOCKER: "true"
      USE_XFORWARDIP: "true"
    depends_on:
      - mongo
      - elasticsearch
    volumes:
      - trudesk_uploads:/usr/src/trudesk/public/uploads
      - trudesk_backups:/usr/src/trudesk/backups
  mongo:
    image: mongo:8.0
    restart: always
    ports:
      - "127.0.0.1:27017:27017"
    env_file:
      - .env
    environment:
      # The official MongoDB image will create this root user on first initialization using
      # the values provided in the .env file. Change before using outside local dev.
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
    volumes:
      - mongo:/var/lib/mongo
      - mongo_data:/data/db:rw
      # Run initialization scripts (only executed on first container start)
      - ./docker/initdb:/docker-entrypoint-initdb.d:ro
  elasticsearch:
    image: elasticsearch:8.19.11
    restart: always
    environment:
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - discovery.type=single-node
      - bootstrap.memory_lock=true
    mem_limit: 1073741824
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "127.0.0.1:9200:9200"
      - "127.0.0.1:9300:9300"
    volumes:
      - elasticsearch:/usr/share/elasticsearch/data
volumes:
  trudesk_uploads:
  trudesk_backups:
  mongo:
  mongo_data:
  elasticsearch: