paths:
  /api/v1/login:
    post:
      tags: [Authentication]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials
    get:
      tags: [Authentication]
      summary: Get logged in user
      security:
        - accessToken: []
      responses:
        200:
          description: Current user object
  /api/v1/logout:
    get:
      tags: [Authentication]
      summary: Logout
      security:
        - accessToken: []
      responses:
        200:
          description: Logged out
